<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>layout_solver_ultra_complex (HTML reference)</title>
  <style>
    :root {
      --bg: #080d17;
      --frame: #142036;
      --top: #1a253b;
      --left: #172339;
      --center: #1d243d;
      --right: #1a2238;
      --panel: #222d47;
      --slot: #202a42;
      --line: rgba(236, 244, 255, 0.72);
      --border: rgba(237, 245, 255, 0.32);
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(1000px 700px at 10% -10%, #1b2d53 0%, transparent 52%),
        radial-gradient(900px 650px at 100% 0%, #17365f 0%, transparent 46%),
        var(--bg);
      color: #f5f8ff;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .frame {
      width: min(1560px, 100%);
      min-height: 920px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--frame);
      box-shadow: var(--shadow);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .top {
      flex: 1;
      border-radius: 12px;
      background: var(--top);
      padding: 10px;
      display: grid;
      grid-template-columns: 1.35fr 0.95fr 0.95fr;
      gap: 12px;
      min-height: 0;
    }

    .col {
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .left { background: var(--left); }
    .center { background: var(--center); }
    .right { background: var(--right); }

    .left-grid {
      height: 230px;
      border-radius: 10px;
      background: #202d47;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-auto-rows: 56px;
      gap: 8px;
    }

    .left-grid .a { background: #3a8ee6; grid-column: span 3; grid-row: span 2; }
    .left-grid .b { background: #c85a50; grid-column: span 2; }
    .left-grid .c { background: #3ec16e; grid-row: span 2; }
    .left-grid .d { background: #e1ae43; grid-column: 1 / span 2; }
    .left-grid .e { background: #6770d7; grid-column: span 2; }
    .left-grid .f { background: #43c5ca; grid-column: span 2; }
    .left-grid .g { background: #8b5fc3; grid-column: 5 / span 2; grid-row: 3; }
    .left-grid .h { background: #48ace3; }

    .tile {
      border-radius: 8px;
    }

    .left-masonry {
      flex: 1;
      border-radius: 10px;
      background: #1f2a42;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      min-height: 0;
    }

    .left-bottom {
      height: 140px;
      border-radius: 10px;
      background: #253149;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      align-items: center;
    }

    .left-bottom .mini {
      border-radius: 8px;
      height: 86px;
    }

    .stack-panel {
      height: 268px;
      border-radius: 12px;
      background: #313a62;
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }

    .layer {
      position: absolute;
      border-radius: 12px;
      transform: translate(0, 0);
    }

    .l1 { width: 290px; height: 180px; background: rgba(48, 140, 240, 0.82); left: 50%; top: 50%; transform: translate(-50%, -50%); }
    .l2 { width: 248px; height: 154px; background: rgba(219, 165, 71, 0.84); left: 50%; top: 50%; transform: translate(-49%, -49%); }
    .l3 { width: 210px; height: 126px; background: rgba(66, 203, 116, 0.84); left: 50%; top: 50%; transform: translate(-48%, -48%); }
    .l4 { width: 156px; height: 94px; background: rgba(235, 86, 101, 0.86); left: 50%; top: 50%; transform: translate(-47%, -47%); }
    .l5 { width: 114px; height: 68px; background: rgba(210, 227, 255, 0.9); left: 50%; top: 50%; transform: translate(-46%, -46%); }

    .radial-panel {
      flex: 1;
      border-radius: 12px;
      background: #22304a;
      position: relative;
      min-height: 0;
      overflow: hidden;
    }

    .orbit {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(100%, 360px);
      height: min(100%, 360px);
      border-radius: 50%;
      opacity: 0.2;
      border: 1px dashed rgba(255, 255, 255, 0.3);
    }

    .dot {
      position: absolute;
      border-radius: 10px;
    }

    .timeline {
      height: 190px;
      border-radius: 10px;
      background: #29334b;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .t-row {
      height: 28px;
      border-radius: 7px;
      background: rgba(14, 18, 32, 0.65);
      padding: 6px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .t-dot {
      width: 36px;
      height: 14px;
      border-radius: 6px;
      background: #5eaef1;
      flex-shrink: 0;
    }

    .t-line {
      width: 180px;
      max-width: calc(100% - 70px);
      height: 12px;
      border-radius: 6px;
      background: var(--line);
      transform-origin: left center;
    }

    .t-flag {
      width: 24px;
      height: 12px;
      border-radius: 6px;
      background: #ea9a4f;
      margin-left: auto;
      flex-shrink: 0;
    }

    .right-top-grid {
      height: 290px;
      border-radius: 10px;
      background: #283257;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: 64px;
      gap: 8px;
    }

    .right-mid {
      flex: 1;
      border-radius: 10px;
      background: #2d3656;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      min-height: 0;
    }

    .row3 {
      height: 130px;
      border-radius: 8px;
      background: #1b2238;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .block-grid {
      flex: 1;
      border-radius: 8px;
      background: #1f2a42;
      padding: 8px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: 44px;
      gap: 8px;
      min-height: 0;
    }

    .probe {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
    }

    .probe.rt { top: 10px; right: 10px; background: #f55b5d; }
    .probe.lb { left: 10px; bottom: 10px; background: #56ea9a; }

    .actions {
      height: 132px;
      border-radius: 10px;
      background: #242d47;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .bottom {
      height: 178px;
      border-radius: 12px;
      background: #1e273b;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(2, 72px);
      gap: 8px;
    }

    .pill {
      border-radius: 8px;
    }

    .b1 { background: #3b8ce7; grid-column: 1 / span 3; grid-row: 1; }
    .b2 { background: #43bc71; grid-column: 4 / span 2; grid-row: 1 / span 2; }
    .b3 { background: #d05f58; grid-column: 6 / span 3; grid-row: 1; }
    .b4 { background: #d8aa41; grid-column: 9 / span 2; grid-row: 1; }
    .b5 { background: #6d72d6; grid-column: 11 / span 2; grid-row: 1 / span 2; }
    .b6 { background: #45c7cb; grid-column: 1 / span 3; grid-row: 2; }
    .b7 { background: #8d63c9; grid-column: 6 / span 2; grid-row: 2; }
    .b8 { background: #52a5eb; grid-column: 8 / span 3; grid-row: 2; }

    @media (max-width: 1450px) {
      .top {
        grid-template-columns: 1fr;
      }
      .frame {
        min-height: 1200px;
      }
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="top">
      <section class="col left">
        <div class="left-grid">
          <div class="tile a"></div>
          <div class="tile b"></div>
          <div class="tile c"></div>
          <div class="tile d"></div>
          <div class="tile e"></div>
          <div class="tile f"></div>
          <div class="tile g"></div>
          <div class="tile h"></div>
        </div>

        <div class="left-masonry">
          <div class="tile" style="height:58px;background:#4f6d93;"></div>
          <div class="tile" style="height:90px;background:#5877a0;"></div>
          <div class="tile" style="height:66px;background:#6182ad;"></div>
          <div class="tile" style="height:108px;background:#6a8bb8;"></div>
          <div class="tile" style="height:52px;background:#4f7fa3;"></div>
          <div class="tile" style="height:82px;background:#5a89b0;"></div>
          <div class="tile" style="height:64px;background:#668fb2;"></div>
          <div class="tile" style="height:96px;background:#6f99bd;"></div>
          <div class="tile" style="height:72px;background:#5483a4;"></div>
          <div class="tile" style="height:60px;background:#5d8eb1;"></div>
          <div class="tile" style="height:88px;background:#6796ba;"></div>
          <div class="tile" style="height:54px;background:#6f9ec2;"></div>
          <div class="tile" style="height:102px;background:#4f78a1;"></div>
          <div class="tile" style="height:70px;background:#5782ab;"></div>
          <div class="tile" style="height:80px;background:#618cb4;"></div>
          <div class="tile" style="height:62px;background:#6a95bc;"></div>
        </div>

        <div class="left-bottom">
          <div class="mini" style="background:#4e6288;"></div>
          <div class="mini" style="background:#556b91;"></div>
          <div class="mini" style="background:#5f7699;"></div>
          <div class="mini" style="background:#677fa1;"></div>
          <div class="mini" style="background:#7188a8;"></div>
        </div>
      </section>

      <section class="col center">
        <div class="stack-panel">
          <div class="layer l1"></div>
          <div class="layer l2"></div>
          <div class="layer l3"></div>
          <div class="layer l4"></div>
          <div class="layer l5"></div>
        </div>

        <div class="radial-panel">
          <div class="orbit"></div>
          <div class="dot" style="width:42px;height:38px;left:50%;top:8%;background:#4aa0ef;"></div>
          <div class="dot" style="width:36px;height:34px;left:70%;top:16%;background:#52aadf;"></div>
          <div class="dot" style="width:46px;height:36px;left:82%;top:30%;background:#5bb4d1;"></div>
          <div class="dot" style="width:40px;height:42px;left:84%;top:49%;background:#63bdc2;"></div>
          <div class="dot" style="width:34px;height:34px;left:76%;top:67%;background:#6ac6b2;"></div>
          <div class="dot" style="width:44px;height:40px;left:62%;top:79%;background:#72cea5;"></div>
          <div class="dot" style="width:40px;height:34px;left:42%;top:83%;background:#7ad494;"></div>
          <div class="dot" style="width:36px;height:40px;left:24%;top:75%;background:#84db87;"></div>
          <div class="dot" style="width:42px;height:38px;left:14%;top:60%;background:#8ce07a;"></div>
          <div class="dot" style="width:34px;height:34px;left:11%;top:43%;background:#96e56f;"></div>
          <div class="dot" style="width:44px;height:40px;left:16%;top:25%;background:#a1e866;"></div>
          <div class="dot" style="width:36px;height:36px;left:29%;top:12%;background:#acea61;"></div>
          <div class="dot" style="width:46px;height:38px;left:47%;top:4%;background:#b5ea5f;"></div>
          <div class="dot" style="width:38px;height:34px;left:60%;top:8%;background:#9edb66;"></div>
          <div class="dot" style="width:34px;height:42px;left:68%;top:6%;background:#84cc74;"></div>
        </div>

        <div class="timeline">
          <div class="t-row"><div class="t-dot"></div><div class="t-line"></div><div class="t-flag"></div></div>
          <div class="t-row"><div class="t-dot" style="background:#68c3ef;"></div><div class="t-line"></div><div class="t-flag"></div></div>
          <div class="t-row"><div class="t-dot" style="background:#73d0e9;"></div><div class="t-line"></div><div class="t-flag"></div></div>
          <div class="t-row"><div class="t-dot" style="background:#7edbe3;"></div><div class="t-line"></div><div class="t-flag"></div></div>
          <div class="t-row"><div class="t-dot" style="background:#89e6dd;"></div><div class="t-line"></div><div class="t-flag"></div></div>
        </div>
      </section>

      <section class="col right">
        <div class="right-top-grid">
          <div class="tile" style="background:#379ef9;grid-column:span 2;"></div>
          <div class="tile" style="background:#d06657;grid-row:span 2;"></div>
          <div class="tile" style="background:#4cc77c;"></div>
          <div class="tile" style="background:#dfb042;grid-column:span 2;"></div>
          <div class="tile" style="background:#6f75d8;"></div>
          <div class="tile" style="background:#46cbcf;grid-row:span 2;"></div>
          <div class="tile" style="background:#9365d4;grid-column:span 2;"></div>
          <div class="tile" style="background:#ea677f;"></div>
        </div>

        <div class="right-mid">
          <div class="row3">
            <div class="tile" style="background:#526ea9;"></div>
            <div class="tile" style="background:#5f7cba;"></div>
            <div class="tile" style="background:#6b8acc;"></div>
          </div>
          <div class="block-grid">
            <div class="tile" style="background:#329df8;grid-column:span 2;grid-row:span 2;"></div>
            <div class="tile" style="background:#d15e52;grid-column:span 2;"></div>
            <div class="tile" style="background:#47c876;grid-row:span 2;"></div>
            <div class="tile" style="background:#e0ab3f;"></div>
            <div class="tile" style="background:#8d66d2;grid-column:span 2;"></div>
            <div class="tile" style="background:#46cdd1;"></div>
          </div>
          <div class="probe rt"></div>
          <div class="probe lb"></div>
        </div>

        <div class="actions">
          <div class="tile" style="background:#3f80e6;"></div>
          <div class="tile" style="background:#5982c9;"></div>
          <div class="tile" style="background:#6f83ad;"></div>
        </div>
      </section>
    </div>

    <div class="bottom">
      <div class="pill b1"></div>
      <div class="pill b2"></div>
      <div class="pill b3"></div>
      <div class="pill b4"></div>
      <div class="pill b5"></div>
      <div class="pill b6"></div>
      <div class="pill b7"></div>
      <div class="pill b8"></div>
    </div>
  </div>
</body>
</html>
